const MAX_DIM = 1568; // Claude recommended max - keeps fine print readable

// Read file as dataURL - works in all sandboxed environments
function readFileAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = () => reject(new Error("Failed to read file"));
    r.readAsDataURL(file);
  });
}

// Compress image using dataURL (not objectURL) - sandbox safe
function compressForAPI(dataURL) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      let w = img.naturalWidth, h = img.naturalHeight;
      if (w > MAX_DIM || h > MAX_DIM) {
        const r = Math.min(MAX_DIM / w, MAX_DIM / h);
        w = Math.round(w * r);
        h = Math.round(h * r);
      }
      const c = document.createElement("canvas");
      c.width = w; c.height = h;
      const ctx = c.getContext("2d");
      // Use high-quality image rendering for text clarity
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";
      ctx.drawImage(img, 0, 0, w, h);

      // Higher quality to keep fine print readable for AI
      let q = 0.85;
      const go = () => {
        const result = c.toDataURL("image/jpeg", q);
        const b64 = result.split(",")[1];
        const byteSize = Math.ceil(b64.length * 3 / 4);
        if (byteSize > 4.5 * 1024 * 1024 && q > 0.25) {
          q -= 0.1;
          go();
        } else {
          resolve({ base64: b64, byteSize });
        }
      };
      go();
    };
    img.onerror = () => reject(new Error("Could not decode image"));
    img.src = dataURL;
  });
}

      const txt = j.content.map(c=>c.text||"").join("").replace(/```json\s*/g,"").replace(/```/g,"").trim();
      let parsed;
      try { parsed = JSON.parse(txt); } catch { const m = txt.match(/\{[\s\S]*\}/); if(m) parsed=JSON.parse(m[0]); else throw new Error("Could not parse AI response"); }
      parsed.event = "";
      setData(parsed);
    } catch(e) { setErr(e.message); } finally { setLoading(false); setProg(""); }
  };

  const upd = (k,v) => setData(p=>({...p,[k]:v}));
  const updA = (sk,v) => setData(p=>({...p,company_address:{...(p.company_address||{}),[sk]:v}}));
  const togP = (o) => setData(p=>{const c=Array.isArray(p.positioning)?p.positioning:[];return{...p,positioning:c.includes(o)?c.filter(x=>x!==o):[...c,o]};});

  const getDd = (f) => {
    if(f.dd==="types") return DD.types;
    if(f.dd==="cat") return DD.cats[data?.type]||[];
    if(f.dd==="ev") return DD.ev;
    if(f.dd==="pt") return DD.pt;
    if(f.dd==="pm") return DD.pm;
    if(f.dd==="pos") return DD.pos;
    return [];
  };

  const cpF = (k,v) => {
    const t = Array.isArray(v)?v.join(", "):typeof v==="object"?Object.values(v||{}).filter(Boolean).join(", "):String(v||"");
    navigator.clipboard.writeText(t); setCopied(k); setTimeout(()=>setCopied(null),1500);
  };

  const cpAll = () => {
    if(!data) return;
    let t="";
    FIELDS.forEach(f=>{
      const v=data[f.k];
      if(f.addr&&typeof v==="object"){t+=`${f.l}:\n`;ADDRF.forEach(a=>{t+=`  ${a.l}: ${v?.[a.k]||"N/A"}\n`;});}
      else if(f.arr&&Array.isArray(v)) t+=`${f.l}: ${v.join(", ")}\n`;
      else t+=`${f.l}: ${v||"N/A"}\n`;
    });
    navigator.clipboard.writeText(t); setAllCop(true); setTimeout(()=>setAllCop(false),2000);
  };

  const reset = () => { setImgs([]); setCountry(""); setData(null); setErr(""); setProg(""); };

  const inp = {width:"100%",padding:"8px 10px",background:"#0d1117",border:"1px solid #2d3748",borderRadius:8,color:"#e2e8f0",fontSize:13,boxSizing:"border-box",fontFamily:"inherit",outline:"none"};
  const sel = {...inp};

  return (
    <div style={{minHeight:"100vh",background:"#0a0e17",color:"#e2e8f0",fontFamily:"'Segoe UI',system-ui,sans-serif"}}>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}} select option{background:#0d1117;color:#e2e8f0} *::-webkit-scrollbar{width:5px;height:5px} *::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}`}</style>

      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#0f172a,#1a1f3a,#0f172a)",borderBottom:"1px solid #1e293b",padding:"14px 20px"}}>
        <div style={{maxWidth:860,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:34,height:34,borderRadius:8,background:"linear-gradient(135deg,#3b82f6,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17}}>📦</div>
            <div>
              <div style={{fontSize:17,fontWeight:700,color:"#f1f5f9"}}>Product Data Extractor</div>
              <div style={{fontSize:10,color:"#64748b"}}>AI-Powered • Upload → Extract → Copy</div>
            </div>
          </div>
          {data && <button onClick={reset} style={{padding:"5px 12px",background:"#1e293b",border:"1px solid #334155",borderRadius:6,color:"#94a3b8",cursor:"pointer",fontSize:12}}>↻ New Product</button>}
        </div>
      </div>

      <div style={{maxWidth:860,margin:"0 auto",padding:"20px 14px"}}>

        {/* UPLOAD */}
        {!data && (
          <div style={{background:"#111827",borderRadius:14,border:"1px solid #1e293b",padding:20,marginBottom:16}}>
            <div style={{margin:"0 0 12px",fontSize:14,color:"#94a3b8",fontWeight:600}}><span style={{color:"#3b82f6"}}>01</span> Upload Product Images</div>

            <div
              onClick={()=>fref.current?.click()}
              style={{border:"2px dashed #2d3748",borderRadius:12,padding:20,textAlign:"center",cursor:"pointer",background:"#0d1117"}}
              onMouseOver={e=>e.currentTarget.style.borderColor="#3b82f6"}
              onMouseOut={e=>e.currentTarget.style.borderColor="#2d3748"}
            >
              <input ref={fref} type="file" accept="image/*" multiple onChange={addImgs} style={{display:"none"}} />
              {!imgs.length ? (
                <div>
                  <div style={{fontSize:38}}>📸</div>
                  <div style={{color:"#94a3b8",fontSize:14,marginTop:4}}>Click to upload product photos</div>
                  <div style={{color:"#4a5568",fontSize:11,marginTop:2}}>All angles • Large images auto-compressed</div>
                </div>
              ) : (
                <div style={{display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center"}}>
                  {imgs.map((im,i) => (
                    <div key={i} style={{position:"relative",width:108,height:108,flexShrink:0}}>
                      <img src={im.dataURL} alt="" style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:8,border:"1px solid #2d3748",display:"block",background:"#1a1a2e"}} />
                      <button onClick={e=>{e.stopPropagation();rmImg(i);}} style={{position:"absolute",top:-6,right:-6,width:20,height:20,borderRadius:"50%",background:"#ef4444",border:"2px solid #111827",color:"#fff",cursor:"pointer",fontSize:10,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,padding:0,lineHeight:1}}>✕</button>
                      <div style={{position:"absolute",bottom:0,left:0,right:0,background:"rgba(0,0,0,.8)",borderRadius:"0 0 8px 8px",padding:"3px 5px"}}>
                        <div style={{fontSize:9,color:"#d1d5db",overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{im.name}</div>
                        <div style={{fontSize:8,color:"#6b7280"}}>{fmtSz(im.size)}</div>
                      </div>
                    </div>
                  ))}
                  <div onClick={e=>{e.stopPropagation();fref.current?.click();}} style={{width:108,height:108,borderRadius:8,border:"2px dashed #2d3748",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:"#4a5568",fontSize:11,cursor:"pointer",flexShrink:0}}>
                    <span style={{fontSize:22}}>+</span><span>Add more</span>
                  </div>
                </div>
              )}
            </div>

            {imgs.length>0 && <div style={{margin:"6px 0 0",fontSize:10,color:"#4a5568"}}>{imgs.length} image{imgs.length>1?"s":""} • {fmtSz(imgs.reduce((s,i)=>s+i.size,0))} total • Auto-compressed before sending</div>}

            {/* Country Selector */}
            {imgs.length>0 && (
              <div style={{marginTop:14,padding:"12px 14px",background:"#0d1117",border:"1px solid #1e293b",borderRadius:10}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                  <span style={{fontSize:16}}>🌍</span>
                  <span style={{fontSize:13,color:"#94a3b8",fontWeight:600}}>Country of Product <span style={{color:"#ef4444"}}>*</span></span>
                </div>
                <select value={country} onChange={e=>{setCountry(e.target.value);setErr("");}} style={{width:"100%",padding:"10px 12px",background:"#111827",border:country?"1px solid #3b82f6":"1px solid #2d3748",borderRadius:8,color:country?"#e2e8f0":"#64748b",fontSize:14,outline:"none",cursor:"pointer"}}>
                  <option value="">— Select country where product is from —</option>
                  {COUNTRIES.map(c=><option key={c} value={c}>{c}</option>)}
                </select>
                {country && <div style={{marginTop:6,fontSize:11,color:"#4ade80"}}>✓ AI will use {country}'s language & local currency for price estimation</div>}
              </div>
            )}

            {imgs.length>0 && (
              <button onClick={extract} disabled={loading} style={{width:"100%",marginTop:12,padding:13,background:loading?"#1e293b":"linear-gradient(135deg,#3b82f6,#8b5cf6)",border:loading?"1px solid #334155":"none",borderRadius:10,color:loading?"#64748b":"#fff",fontSize:14,fontWeight:600,cursor:loading?"not-allowed":"pointer"}}>
                {loading ? "⏳ "+prog : `🚀 Extract Data from ${imgs.length} Image${imgs.length>1?"s":""}`}
              </button>
            )}

            {err && <div style={{marginTop:10,padding:"9px 12px",background:"#1c1117",border:"1px solid #7f1d1d",borderRadius:8,color:"#fca5a5",fontSize:12,wordBreak:"break-word"}}>❌ {err}</div>}
          </div>
        )}

        {/* Loading */}
        {loading && (
          <div style={{textAlign:"center",padding:"28px 0"}}>
            <div style={{display:"inline-block",width:44,height:44,borderRadius:"50%",border:"3px solid #1e293b",borderTopColor:"#3b82f6",animation:"spin 1s linear infinite"}} />
            <div style={{color:"#94a3b8",marginTop:10,fontSize:12}}>{prog}</div>
          </div>
        )}

        {/* RESULTS */}
        {data && (
          <div>
            {imgs.length>0 && (
              <div style={{display:"flex",gap:5,marginBottom:12,overflowX:"auto",paddingBottom:4}}>
                {imgs.map((im,i) => <img key={i} src={im.dataURL} alt="" style={{width:44,height:44,objectFit:"cover",borderRadius:6,border:"1px solid #2d3748",flexShrink:0}} />)}
              </div>
            )}

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div style={{fontSize:14,color:"#94a3b8",fontWeight:600}}><span style={{color:"#3b82f6"}}>02</span> Extracted Data — Edit & Copy</div>
              <button onClick={cpAll} style={{padding:"6px 15px",background:allCop?"#059669":"linear-gradient(135deg,#3b82f6,#8b5cf6)",border:"none",borderRadius:6,color:"#fff",fontSize:11,fontWeight:600,cursor:"pointer"}}>
                {allCop?"✓ Copied!":"📋 Copy All"}
              </button>
            </div>

            <div style={{display:"flex",flexDirection:"column",gap:5}}>
              {FIELDS.map(f => {
                const v = data[f.k];
                return (
                  <div key={f.k} style={{background:"#111827",borderRadius:9,border:"1px solid #1e293b",padding:"9px 12px"}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:5}}>
                      <span style={{fontSize:10,color:"#64748b",fontWeight:600,textTransform:"uppercase",letterSpacing:.4}}>{f.i} {f.l}</span>
                      <button onClick={()=>cpF(f.k,v)} style={{padding:"1px 9px",background:copied===f.k?"#059669":"#1e293b",border:"1px solid "+(copied===f.k?"#059669":"#334155"),borderRadius:4,color:copied===f.k?"#fff":"#94a3b8",cursor:"pointer",fontSize:10}}>
                        {copied===f.k?"✓":"Copy"}
                      </button>
                    </div>

                    {f.dd && !f.arr ? (
                      <select value={v||""} onChange={e=>upd(f.k,e.target.value)} style={sel}>
                        <option value="">— Select —</option>
                        {getDd(f).map(o=><option key={o} value={o}>{o}</option>)}
                      </select>
                    ) : f.arr ? (
                      <div>
                        {Array.isArray(v)&&v.length>0 && (
                          <div style={{display:"flex",flexWrap:"wrap",gap:3,marginBottom:5}}>
                            {v.map((x,i)=>(
                              <span key={i} onClick={()=>togP(x)} style={{padding:"1px 8px",background:"#1e3a5f",border:"1px solid #3b82f6",borderRadius:14,color:"#93c5fd",fontSize:10,cursor:"pointer"}}>{x} ✕</span>
                            ))}
                          </div>
                        )}
                        <select value="" onChange={e=>{if(e.target.value)togP(e.target.value);}} style={sel}>
                          <option value="">+ Add positioning...</option>
                          {getDd(f).filter(o=>!(Array.isArray(v)?v:[]).includes(o)).map(o=><option key={o} value={o}>{o}</option>)}
                        </select>
                      </div>
                    ) : f.addr ? (
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
                        {ADDRF.map(a=>(
                          <div key={a.k}>
                            <div style={{fontSize:9,color:"#4a5568",marginBottom:1}}>{a.l}</div>
                            <input type="text" value={(v&&typeof v==="object"?v[a.k]:"")||""} onChange={e=>updA(a.k,e.target.value)} style={inp} />
                          </div>
                        ))}
                      </div>
                    ) : f.ml ? (
                      <textarea value={v||""} onChange={e=>upd(f.k,e.target.value)} rows={3} style={{...inp,resize:"vertical"}} />
                    ) : (
                      <input type="text" value={v||""} onChange={e=>upd(f.k,e.target.value)} style={inp} />
                    )}
                  </div>
                );
              })}
            </div>

            <div style={{display:"flex",gap:8,marginTop:14,paddingBottom:30}}>
              <button onClick={cpAll} style={{flex:1,padding:12,background:allCop?"#059669":"linear-gradient(135deg,#3b82f6,#8b5cf6)",border:"none",borderRadius:10,color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer"}}>
                {allCop?"✓ All Copied!":"📋 Copy All to Clipboard"}
              </button>
              <button onClick={reset} style={{padding:"12px 18px",background:"#1e293b",border:"1px solid #334155",borderRadius:10,color:"#94a3b8",fontSize:13,cursor:"pointer"}}>↻ New</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}


// API Key wrapper component
function AppWithAuth() {
  const [apiKey, setApiKey] = React.useState(localStorage.getItem("pde_api_key") || "");
  const [tempKey, setTempKey] = React.useState("");
  const [showModal, setShowModal] = React.useState(!apiKey);
  const [keyErr, setKeyErr] = React.useState("");

  const saveKey = () => {
    const k = tempKey.trim();
    if (!k) { setKeyErr("Please enter your API key."); return; }
    if (!k.startsWith("sk-ant-")) { setKeyErr("Key should start with sk-ant-"); return; }
    localStorage.setItem("pde_api_key", k);
    setApiKey(k);
    setShowModal(false);
    setKeyErr("");
  };

  const changeKey = () => {
    setTempKey(apiKey);
    setShowModal(true);
  };

  const logout = () => {
    localStorage.removeItem("pde_api_key");
    setApiKey("");
    setTempKey("");
    setShowModal(true);
  };

  // Patch fetch to inject API key
  React.useEffect(() => {
    if (!apiKey) return;
    const origFetch = window._origFetch || window.fetch;
    if (!window._origFetch) window._origFetch = window.fetch;
    window.fetch = function(url, opts) {
      if (typeof url === "string" && url.includes("api.anthropic.com")) {
        opts = opts || {};
        opts.headers = opts.headers || {};
        opts.headers["x-api-key"] = apiKey;
        opts.headers["anthropic-version"] = "2023-06-01";
        opts.headers["anthropic-dangerous-direct-browser-access"] = "true";
      }
      return origFetch.call(this, url, opts);
    };
    return () => { window.fetch = origFetch; };
  }, [apiKey]);

  if (showModal) {
    return (
      <div className="api-overlay">
        <div className="api-modal">
          <h2>🔑 API Key Required</h2>
          <p>Enter your Anthropic API key to use the Product Data Extractor. Your key is stored locally in your browser only — never sent anywhere except Anthropic's API.</p>
          {apiKey && <div className="saved">✓ You have a saved key. Enter a new one to replace it.</div>}
          {keyErr && <div className="err">❌ {keyErr}</div>}
          <input
            type="password"
            placeholder="sk-ant-api03-..."
            value={tempKey}
            onChange={(e) => { setTempKey(e.target.value); setKeyErr(""); }}
            onKeyDown={(e) => e.key === "Enter" && saveKey()}
          />
          <button onClick={saveKey} disabled={!tempKey.trim()}>
            {apiKey ? "Update API Key" : "Save & Start"}
          </button>
          {apiKey && <button onClick={() => setShowModal(false)} style={{marginTop:8,background:"#1e293b",border:"1px solid #334155"}}>Cancel</button>}
          <div className="hint">
            Get your key at <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener" style={{color:"#3b82f6"}}>console.anthropic.com</a>
            <br/>Cost: ~$0.05-0.15 per product extraction
          </div>
        </div>
      </div>
    );
  }

  return (
    <div>
      <div style={{position:"fixed",top:10,right:10,zIndex:999,display:"flex",gap:6}}>
        <button onClick={changeKey} style={{padding:"4px 10px",background:"#1e293b",border:"1px solid #334155",borderRadius:5,color:"#64748b",cursor:"pointer",fontSize:10}}>🔑 Key</button>
        <button onClick={logout} style={{padding:"4px 10px",background:"#1e293b",border:"1px solid #334155",borderRadius:5,color:"#64748b",cursor:"pointer",fontSize:10}}>Logout</button>
      </div>
      <App />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AppWithAuth />);
</script>
</body>
</html>
