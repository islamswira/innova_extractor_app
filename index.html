         function enhanceImage(ctx, w, h) {
           // Apply contrast enhancement and sharpening for better text readability
           const imageData = ctx.getImageData(0, 0, w, h);
           const d = imageData.data;
           
           // 1. Auto contrast stretch - find actual min/max brightness
           let minB = 255, maxB = 0;
           for (let i = 0; i < d.length; i += 4) {
             const brightness = (d[i] + d[i+1] + d[i+2]) / 3;
             if (brightness < minB) minB = brightness;
             if (brightness > maxB) maxB = brightness;
           }
           const range = maxB - minB || 1;
           
           // 2. Apply contrast stretch + slight sharpening boost
           for (let i = 0; i < d.length; i += 4) {
             for (let c = 0; c < 3; c++) {
               // Contrast stretch
               let val = ((d[i+c] - minB) / range) * 255;
               // Mild S-curve for better contrast on text
               val = val / 255;
               val = val < 0.5 ? 2 * val * val : 1 - 2 * (1 - val) * (1 - val);
               d[i+c] = Math.max(0, Math.min(255, Math.round(val * 255)));
             }
           }
           ctx.putImageData(imageData, 0, 0);
           
           // 3. Unsharp mask via double-canvas technique
           const c2 = document.createElement("canvas");
           c2.width = w; c2.height = h;
           const x2 = c2.getContext("2d");
           x2.filter = "blur(1px)";
           x2.drawImage(ctx.canvas, 0, 0);

           const blurred = x2.getImageData(0, 0, w, h);

           for (let i = 0; i < sharp.data.length; i += 4) {
             for (let c = 0; c < 3; c++) {
               const diff = sharp.data[i+c] - blurred.data[i+c];
               sharp.data[i+c] = Math.max(0, Math.min(255, Math.round(sharp.data[i+c] + diff * amount)));
             }
           }
           ctx.putImageData(sharp, 0, 0);
         }

                       {!imgs.length?(<div><div style={{fontSize:36,color:mode==="food"?"#10b981":"#a855f7"}}>+</div><div style={{color:"#94a3b8",fontSize:13,marginTop:4}}>Click to upload product photos</div></div>):(
                         <div style={{display:"flex",flexWrap:"wrap",gap:7,justifyContent:"center"}}>
                           {imgs.map((im,i)=>(<div key={i} style={{position:"relative",width:100,height:100,flexShrink:0}}><img src={im.dataURL} alt="" style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:8,border:"1px solid #2d3748",display:"block"}}/><button onClick={e=>{e.stopPropagation();rmImg(i)}} style={{position:"absolute",top:-5,right:-5,width:18,height:18,borderRadius:"50%",background:"#ef4444",border:"2px solid #111827",color:"#fff",cursor:"pointer",fontSize:9,display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>X</button><div style={{position:"absolute",bottom:0,left:0,right:0,background:"rgba(0,0,0,.8)",borderRadius:"0 0 8px 8px",padding:"2px 4px"}}><div style={{fontSize:8,color:"#d1d5db",overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{im.name}</div><div style={{fontSize:7,color:"#6b7280"}}>{fmtSz(im.size)}</div></div></div>))}
                           <div onClick={e=>{e.stopPropagation();fref.current?.click()}} style={{width:100,height:100,borderRadius:8,border:"2px dashed #2d3748",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:"#4a5568",fontSize:10,cursor:"pointer"}}><span style={{fontSize:20}}>+</span>Add more</div>
                         </div>
                       )}
                     </div>
                     {imgs.length>0&&<div style={{margin:"5px 0 0",fontSize:10,color:"#4a5568"}}>{imgs.length} image{imgs.length>1?"s":""} | {fmtSz(imgs.reduce((s,i)=>s+i.size,0))} | Auto-compressed</div>}
                     {imgs.length>0&&(<div style={{marginTop:12,padding:"10px 12px",background:"#0d1117",border:"1px solid #1e293b",borderRadius:10}}>
                       <div style={{fontSize:12,color:"#94a3b8",fontWeight:600,marginBottom:6}}>Country of Product <span style={{color:"#ef4444"}}>*</span></div>
                       <select value={country} onChange={e=>{setCountry(e.target.value);setErr("")}} style={{...bi,padding:"10px 12px",fontSize:14,border:country?"1px solid "+(mode==="food"?"#10b981":"#8b5cf6"):"1px solid #2d3748",color:country?"#e2e8f0":"#64748b"}}><option value="">-- Select country --</option>{COUNTRIES.map(c=><option key={c} value={c}>{c}</option>)}</select>
                       {country&&<div style={{marginTop:5,fontSize:10,color:"#4ade80"}}>AI will use {country} language & currency</div>}
                     </div>)}
                     {imgs.length>0&&(<button onClick={extract} disabled={loading} style={{width:"100%",marginTop:10,padding:12,background:loading?"#1e293b":mode==="food"?"linear-gradient(135deg,#059669,#10b981)":"linear-gradient(135deg,#8b5cf6,#a855f7)",border:loading?"1px solid #334155":"none",borderRadius:10,color:loading?"#64748b":"#fff",fontSize:13,fontWeight:600,cursor:loading?"not-allowed":"pointer"}}>{loading?prog:"Extract Data from "+imgs.length+" Image"+(imgs.length>1?"s":"")}</button>)}
                     {err&&<div style={{marginTop:8,padding:"8px 10px",background:"#1c1117",border:"1px solid #7f1d1d",borderRadius:8,color:"#fca5a5",fontSize:11,wordBreak:"break-word"}}>{err}</div>}
                   </div>
                 )}
         
                 {loading&&(<div style={{textAlign:"center",padding:"24px 0"}}><div style={{display:"inline-block",width:40,height:40,borderRadius:"50%",border:"3px solid #1e293b",borderTopColor:mode==="food"?"#10b981":"#8b5cf6",animation:"spin 1s linear infinite"}}/><div style={{color:"#94a3b8",marginTop:8,fontSize:11}}>{prog}</div></div>)}
         
                 {data&&(
                   <div>
                     <div style={{display:"flex",gap:4,marginBottom:10,overflowX:"auto",paddingBottom:3}}>
                       {imgs.map((im,i)=><img key={i} src={im.dataURL} alt="" style={{width:40,height:40,objectFit:"cover",borderRadius:5,border:"1px solid #2d3748",flexShrink:0}}/>)}
                       {country&&<div style={{display:"flex",alignItems:"center",padding:"0 7px",background:"#1e293b",borderRadius:5,fontSize:10,color:"#94a3b8",flexShrink:0}}>{country}</div>}
                     </div>
                     <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                       <div style={{fontSize:13,color:"#94a3b8",fontWeight:600}}><span style={{color:mode==="food"?"#10b981":"#a855f7"}}>02</span> Extracted Data</div>
                       <button onClick={cpAll} style={{padding:"5px 14px",background:allCop?"#059669":mode==="food"?"linear-gradient(135deg,#059669,#10b981)":"linear-gradient(135deg,#8b5cf6,#a855f7)",border:"none",borderRadius:6,color:"#fff",fontSize:10,fontWeight:600,cursor:"pointer"}}>{allCop?"Copied!":"Copy All"}</button>
                     </div>
         
                     <div style={{display:"flex",flexDirection:"column",gap:4}}>
                       {FIELDS.map(f=>{
                         const v=data[f.k];
                         const isFlavors=f.k==="flavors";
                         return(
                           <div key={f.k} style={{background:"#111827",borderRadius:8,border:"1px solid #1e293b",padding:"8px 11px"}}>
                             <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
                               <span style={{fontSize:9,color:"#64748b",fontWeight:600,textTransform:"uppercase",letterSpacing:.4}}>{f.l}</span>
                               <button onClick={()=>cpF(f.k,v)} style={{padding:"1px 8px",background:copied===f.k?"#059669":"#1e293b",border:"1px solid "+(copied===f.k?"#059669":"#334155"),borderRadius:4,color:copied===f.k?"#fff":"#94a3b8",cursor:"pointer",fontSize:9}}>{copied===f.k?"OK":"Copy"}</button>
                             </div>
                             {f.dd&&!f.arr&&!isFlavors?(
                               <select value={v||""} onChange={e=>upd(f.k,e.target.value)} style={bi}><option value="">-- Select --</option>{getDd(f).map(o=><option key={o} value={o}>{o}</option>)}</select>
                             ):f.arr&&!isFlavors?(
                               <div>
                                 {Array.isArray(v)&&v.length>0&&(<div style={{display:"flex",flexWrap:"wrap",gap:2,marginBottom:4}}>{v.map((x,i)=>(<span key={i} onClick={()=>togArr(f.k,x)} style={{padding:"1px 7px",background:"#1e3a5f",border:"1px solid #3b82f6",borderRadius:12,color:"#93c5fd",fontSize:9,cursor:"pointer"}}>{x} x</span>))}</div>)}
                                 <select value="" onChange={e=>{if(e.target.value)togArr(f.k,e.target.value)}} style={bi}><option value="">+ Add...</option>{getDd(f).filter(o=>!(Array.isArray(v)?v:[]).includes(o)).map(o=><option key={o} value={o}>{o}</option>)}</select>
                               </div>
                             ):isFlavors?(
                               <div>
                                 {Array.isArray(v)&&v.length>0&&(<div style={{display:"flex",flexWrap:"wrap",gap:2,marginBottom:4}}>{v.map((x,i)=>(<span key={i} style={{padding:"1px 7px",background:"#3b2a1a",border:"1px solid #d97706",borderRadius:12,color:"#fbbf24",fontSize:9,display:"inline-flex",alignItems:"center",gap:3}}>{"Flavor "+(i+1)+": "+x}<span onClick={()=>rmFlavor(i)} style={{cursor:"pointer",opacity:.6}}>x</span></span>))}</div>)}
                                 <div style={{display:"flex",gap:4}}><input type="text" value={flavorInput} onChange={e=>setFlavorInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addFlavor(flavorInput)} placeholder="Type flavor and press Enter..." style={{...bi,flex:1}}/><button onClick={()=>addFlavor(flavorInput)} style={{padding:"6px 12px",background:"#d97706",border:"none",borderRadius:6,color:"#fff",fontSize:11,cursor:"pointer",flexShrink:0}}>+ Add</button></div>
                               </div>
                             ):f.addr?(
                               <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4}}>{ADDRF.map(a=>(<div key={a.k}><div style={{fontSize:8,color:"#4a5568",marginBottom:1}}>{a.l}</div><input type="text" value={(v&&typeof v==="object"?v[a.k]:"")||""} onChange={e=>updA(a.k,e.target.value)} style={bi}/></div>))}</div>
                             ):f.ml?(
                               <textarea value={v||""} onChange={e=>upd(f.k,e.target.value)} rows={3} style={{...bi,resize:"vertical"}}/>
                             ):(
                               <input type="text" value={v||""} onChange={e=>upd(f.k,e.target.value)} style={bi}/>
                             )}
                           </div>
                         );
                       })}
                     </div>
         
                     <div style={{display:"flex",gap:6,marginTop:12,paddingBottom:28}}>
                       <button onClick={cpAll} style={{flex:1,padding:11,background:allCop?"#059669":mode==="food"?"linear-gradient(135deg,#059669,#10b981)":"linear-gradient(135deg,#8b5cf6,#a855f7)",border:"none",borderRadius:10,color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer"}}>{allCop?"All Copied!":"Copy All to Clipboard"}</button>
                       <button onClick={reset} style={{padding:"11px 16px",background:"#1e293b",border:"1px solid #334155",borderRadius:10,color:"#94a3b8",fontSize:12,cursor:"pointer"}}>New</button>
                     </div>
                   </div>
                 )}
               </div>
             </div>
           );
         }
         
         
         function AppWithAuth(){
           const[apiKey,setApiKey]=React.useState(localStorage.getItem("pde_api_key")||"");
           const[tempKey,setTempKey]=React.useState("");
           const[showModal,setShowModal]=React.useState(!apiKey);
           const[keyErr,setKeyErr]=React.useState("");
           const saveKey=()=>{const k=tempKey.trim();if(!k){setKeyErr("Enter API key.");return}if(!k.startsWith("sk-ant-")){setKeyErr("Key should start with sk-ant-");return}localStorage.setItem("pde_api_key",k);setApiKey(k);setShowModal(false);setKeyErr("")};
           React.useEffect(()=>{if(!apiKey)return;const orig=window._origFetch||window.fetch;if(!window._origFetch)window._origFetch=window.fetch;window.fetch=function(url,opts){if(typeof url==="string"&&url.includes("api.anthropic.com")){opts=opts||{};opts.headers=opts.headers||{};opts.headers["x-api-key"]=apiKey;opts.headers["anthropic-version"]="2023-06-01";opts.headers["anthropic-dangerous-direct-browser-access"]="true"}return orig.call(this,url,opts)};return()=>{window.fetch=orig}},[apiKey]);
           if(showModal)return(<div className="api-overlay"><div className="api-modal"><h2>API Key Required</h2><p>Enter your Anthropic API key. Stored locally in your browser only.</p>{keyErr&&<div style={{color:"#fca5a5",fontSize:11,marginBottom:8}}>{keyErr}</div>}<input type="password" placeholder="sk-ant-api03-..." value={tempKey} onChange={e=>{setTempKey(e.target.value);setKeyErr("")}} onKeyDown={e=>e.key==="Enter"&&saveKey()}/><button onClick={saveKey} disabled={!tempKey.trim()}>Save and Start</button><div className="hint">Get key at <a href="https://console.anthropic.com/settings/keys" target="_blank" style={{color:"#3b82f6"}}>console.anthropic.com</a></div></div></div>);
           return(<div><div style={{position:"fixed",top:8,right:8,zIndex:999,display:"flex",gap:4}}><button onClick={()=>{setTempKey(apiKey);setShowModal(true)}} style={{padding:"3px 8px",background:"#1e293b",border:"1px solid #334155",borderRadius:4,color:"#64748b",cursor:"pointer",fontSize:9}}>Key</button><button onClick={()=>{localStorage.removeItem("pde_api_key");setApiKey("");setShowModal(true)}} style={{padding:"3px 8px",background:"#1e293b",border:"1px solid #334155",borderRadius:4,color:"#64748b",cursor:"pointer",fontSize:9}}>Logout</button></div><App/></div>);
         }
         ReactDOM.createRoot(document.getElementById("root")).render(<AppWithAuth/>);
      </script>
   </body>
</html>
